name: Build APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ---- Debug build (branch pushes & PRs) ----
      - name: Build debug APK
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: ./gradlew assembleDebug

      - name: Upload debug APK artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: Firefont-${{ github.sha }}-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      # ---- Release build (tag pushes) ----
      - name: Generate signing keystore
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          keytool -genkey -v -keystore firefont.jks \
            -alias firefont -keyalg RSA -keysize 2048 \
            -validity 3650 -storepass firefont123 -keypass firefont123 \
            -dname "CN=Firefont, OU=Firefont, O=Firefont, L=Unknown, ST=Unknown, C=CN"

      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_PASSWORD: firefont123
          KEY_ALIAS: firefont
          KEY_PASSWORD: firefont123
        run: ./gradlew assembleRelease

      - name: Upload release APK artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: Firefont-${{ github.ref_name }}
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create Release and upload APK
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "See [README](https://github.com/${{ github.repository }}) for installation instructions." \
            app/build/outputs/apk/release/app-release.apk#"Firefont-${{ github.ref_name }}.apk" \
            --verify-tag
