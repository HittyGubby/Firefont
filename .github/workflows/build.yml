name: Build APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate signing keystore (for tag/release builds)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        run: |
          keytool -genkey -v -keystore firefont.jks \
            -alias firefont -keyalg RSA -keysize 2048 \
            -validity 3650 -storepass firefont123 -keypass firefont123 \
            -dname "CN=Firefont, OU=Firefont, O=Firefont, L=Unknown, ST=Unknown, C=CN"

      - name: Build debug APK
        if: "!startsWith(github.ref, 'refs/tags/v') && github.event_name != 'release'"
        run: ./gradlew assembleDebug

      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        env:
          KEYSTORE_PASSWORD: firefont123
          KEY_ALIAS: firefont
          KEY_PASSWORD: firefont123
        run: ./gradlew assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Firefont-${{ github.ref_name }}
          path: app/build/outputs/apk/debug/app-debug.apk
        if: "!startsWith(github.ref, 'refs/tags/v') && github.event_name != 'release'"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: Firefont-${{ github.ref_name }}
          path: app/build/outputs/apk/release/app-release.apk
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'

      - name: Attach APK to release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            app/build/outputs/apk/release/app-release.apk \
            --clobber
